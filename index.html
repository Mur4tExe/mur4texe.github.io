<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cros Bio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #100d07 0%, #1a1408 50%, #0f0b04 100%);
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      color: #fdf3dc;
      overflow-x: hidden;
    }

    /* ── Partiküller ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: blink var(--dur) var(--delay) infinite ease-in-out;
    }

    @keyframes blink {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      35%  { opacity: 0.85; }
      55%  { opacity: 0; }
      100% { opacity: 0; }
    }

    /* ── Sayfa içeriği ── */
    #app {
      position: relative;
      z-index: 1;
    }


    /* Profil kartı */
    .card {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Avatar */
    .avatar-ring {
      margin-top: 40px;
      position: relative;
      z-index: 2;
      width: 116px;
      height: 116px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #d4a843, #e8c97a, #f0dba0);
      box-shadow: 0 0 28px rgba(212,168,67,0.5);
    }

    .avatar-img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid #100d07;
    }

    /* İsim */
    .name {
      margin-top: 16px;
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #e8c97a, #f0dba0, #fdf3dc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    /* Bio kutusu */
    .bio-box {
      margin-top: 14px;
      width: 100%;
      background: rgba(212,168,67,0.07);
      border: 1px solid rgba(212,168,67,0.18);
      border-radius: 16px;
      padding: 16px 20px;
      backdrop-filter: blur(10px);
    }

    .bio-text {
      font-size: 14px;
      line-height: 1.75;
      color: rgba(240,219,160,0.55);
    }

    .bio-text strong {
      color: #e8c97a;
      font-weight: 600;
    }

    /* Linkler */
    .links {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      border-radius: 14px;
      background: rgba(232,201,122,0.06);
      border: 1px solid rgba(232,201,122,0.12);
      color: #fdf3dc;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      backdrop-filter: blur(8px);
    }

    .link-item:hover {
      background: rgba(232,201,122,0.13);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(212,168,67,0.20);
    }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-label { flex: 1; text-align: left; }

    .link-arrow { opacity: 0.35; flex-shrink: 0; }
  </style>
</head>

  <script>
    // ── Partiküller ──
    const container = document.getElementById('particles');
    const COLORS = [
      'rgba(212,168,67,VAR)',
      'rgba(232,201,122,VAR)',
      'rgba(240,219,160,VAR)',
      'rgba(253,243,220,VAR)',
      'rgba(180,140,50,VAR)',
    ];

    for (let i = 0; i < 58; i++) {
      const dot = document.createElement('span');
      dot.className = 'dot';

      const r     = 0.8 + Math.random() * 2;
      const color = COLORS[Math.floor(Math.random() * COLORS.length)]
                      .replace('VAR', (0.55 + Math.random() * 0.45).toFixed(2));
      const dur   = (1.0 + Math.random() * 3).toFixed(2);
      const delay = (Math.random() * 5).toFixed(2);

      dot.style.left   = (Math.random() * 100) + '%';
      dot.style.top    = (Math.random() * 100) + '%';
      dot.style.width  = (r * 2) + 'px';
      dot.style.height = (r * 2) + 'px';
      dot.style.background  = color;
      dot.style.boxShadow   = `0 0 ${r * 4}px ${color}`;
      dot.style.setProperty('--dur',   dur   + 's');
      dot.style.setProperty('--delay', delay + 's');

      container.appendChild(dot);
    }
  </script>
